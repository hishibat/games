<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neon Breaker - リアル系アルカノイド</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="layout">
      <section class="hud" aria-label="ゲーム情報">
        <div class="panel">
          <h1>NEON BREAKER</h1>
          <p>リアルな反射とエフェクトのアルカノイド風ブロック崩し</p>
        </div>
        <div class="stats panel">
          <div><span>スコア</span><strong id="score">0</strong></div>
          <div><span>ライフ</span><strong id="lives">3</strong></div>
          <div><span>レベル</span><strong id="level">1</strong></div>
          <div><span>コンボ</span><strong id="combo">x1</strong></div>
          <div class="power-cell"><span>パワーアップ</span><strong id="power">—</strong></div>
        </div>
        <div class="controls panel">
          <h2>操作</h2>
          <ul>
            <li><kbd>A</kbd> <kbd>D</kbd> / <kbd>←</kbd> <kbd>→</kbd> で移動</li>
            <li><kbd>Space</kbd> で開始 / 一時停止 / ボール発射</li>
            <li><kbd>J</kbd> / <kbd>Shift</kbd> / クリックでレーザー発射</li>
            <li>マウス移動にも対応</li>
          </ul>
        </div>
        <div class="legend panel">
          <h2>カプセル</h2>
          <ul class="powers">
            <li><span class="dot" style="--c:#3ea7ff">E</span>拡張 パドルが伸びる</li>
            <li><span class="dot" style="--c:#ff4d6d">L</span>レーザー 弾を撃てる</li>
            <li><span class="dot" style="--c:#36d6a0">D</span>マルチ ボール増加</li>
            <li><span class="dot" style="--c:#b07cff">C</span>キャッチ ボールを掴む</li>
            <li><span class="dot" style="--c:#ffb347">S</span>スロー 球速ダウン</li>
            <li><span class="dot" style="--c:#9aff8a">P</span>1UP ライフ+1</li>
          </ul>
        </div>
      </section>

      <section class="game-area">
        <canvas id="game" width="1000" height="620" aria-label="ゲーム画面"></canvas>
        <div id="overlay" class="overlay">
          <h2 id="overlayTitle">SPACEでスタート</h2>
          <p id="overlaySub">全ブロックを破壊しよう</p>
        </div>
      </section>
    </main>

    <script src="game.js"></script>
  </body>
</html>
